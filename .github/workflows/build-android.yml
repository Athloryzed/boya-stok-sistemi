name: Build Android APK

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        working-directory: frontend
        run: yarn install

      - name: Create frontend .env
        working-directory: frontend
        run: |
          echo "REACT_APP_BACKEND_URL=${{ secrets.BACKEND_URL || 'https://bksistem.space' }}" > .env
          echo "WDS_SOCKET_PORT=443" >> .env
          echo "ENABLE_HEALTH_CHECK=false" >> .env

      - name: Build frontend
        working-directory: frontend
        env:
          CI: false
        run: yarn build

      - name: Sync Capacitor
        working-directory: frontend
        run: npx cap sync android

      - name: Create google-services.json
        working-directory: frontend/android/app
        run: |
          cat > google-services.json << 'GSEOF'
          {
            "project_info": {
              "project_number": "480110726560",
              "project_id": "buse-kagit",
              "storage_bucket": "buse-kagit.firebasestorage.app"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:480110726560:android:a5254c27e3110893aae8c5",
                  "android_client_info": {
                    "package_name": "com.busekagit.app"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "AIzaSyCukhhyKj86EgsZ32WTiQ3ijpvRAcIqsnk"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          GSEOF
          echo "google-services.json created successfully"

      - name: Create Firebase Service Account (for backend notifications)
        working-directory: frontend
        run: |
          mkdir -p ../backend
          if [ -n "${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}" ]; then
            echo '${{ secrets.FIREBASE_SERVICE_ACCOUNT_KEY }}' > ../backend/firebase-service-account.json
          fi

      - name: Generate Release Keystore
        working-directory: frontend/android/app
        run: |
          keytool -genkeypair \
            -v \
            -storetype JKS \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass busekagit2024 \
            -keypass busekagit2024 \
            -alias busekagit \
            -keystore release-keystore.jks \
            -dname "CN=Buse Kagit, OU=Development, O=Buse Kagit, L=Istanbul, ST=Istanbul, C=TR"

      - name: Make Gradle executable
        working-directory: frontend/android
        run: chmod +x ./gradlew

      - name: Build Debug APK
        working-directory: frontend/android
        run: ./gradlew assembleDebug

      - name: Build Signed Release APK
        working-directory: frontend/android
        env:
          KEYSTORE_PASSWORD: busekagit2024
          KEY_ALIAS: busekagit
          KEY_PASSWORD: busekagit2024
        run: ./gradlew assembleRelease

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: buse-kagit-debug-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Upload Signed Release APK
        uses: actions/upload-artifact@v4
        with:
          name: buse-kagit-release-apk
          path: frontend/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
