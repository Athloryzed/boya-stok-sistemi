# Buse Kağıt — Nginx Reverse Proxy + Static SPA + Let's Encrypt SSL
# /etc/nginx/sites-available/buse-kagit

# Rate limit zones (Brute force protection on auth endpoints)
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=300r/m;

# Upstream (uvicorn)
upstream buse_backend {
    server 127.0.0.1:8001;
    keepalive 32;
}

# HTTP → HTTPS redirect (certbot bunu otomatik ekler ama yedek olarak)
server {
    listen 80;
    listen [::]:80;
    server_name bksistem.space www.bksistem.space;

    # Let's Encrypt challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name bksistem.space www.bksistem.space;

    # SSL — certbot tarafından doldurulacak:
    # ssl_certificate /etc/letsencrypt/live/bksistem.space/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/bksistem.space/privkey.pem;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/atom+xml image/svg+xml;
    gzip_min_length 256;

    # Upload size (image uploads up to 10MB)
    client_max_body_size 15M;
    client_body_timeout 60s;
    client_header_timeout 30s;

    # Frontend (React SPA build)
    root /opt/buse-kagit/frontend/build;
    index index.html;

    # Static assets — long cache
    location /static/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|webp|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public";
        try_files $uri =404;
    }

    # PWA service worker — no cache (her zaman güncel)
    location ~ ^/(service-worker\.js|sw\.js|firebase-messaging-sw\.js)$ {
        add_header Cache-Control "no-store, no-cache, must-revalidate" always;
        try_files $uri =404;
    }

    # Manifest, robots vb.
    location = /manifest.json { try_files $uri =404; }
    location = /robots.txt   { try_files $uri =404; }

    # Login endpoints — strict rate limit
    location ~ ^/api/(management|dashboard|users|drivers)/login$ {
        limit_req zone=auth_limit burst=10 nodelay;
        proxy_pass http://buse_backend;
        include /etc/nginx/proxy_params;
    }

    # Genel API — daha gevşek limit
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;
        proxy_pass http://buse_backend;
        include /etc/nginx/proxy_params;
        proxy_buffering off;
        proxy_read_timeout 300s;
    }

    # WebSocket
    location /ws {
        proxy_pass http://buse_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;  # 24h — long-lived ws
        proxy_send_timeout 86400s;
    }

    # SPA fallback (React Router)
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache" always;
    }

    # Hide sensitive paths
    location ~ /\. { deny all; }
    location ~ /\.env { deny all; }
}
